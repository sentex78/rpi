<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel rpi4</title>

  <!-- Favicon emoji -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8D%93%3C/text%3E%3C/svg%3E">


  <meta name="theme-color" content="#111827">

  <style>
    :root{
      --bg:#0b1220; --card:#111827; --text:#e5e7eb; --muted:#9ca3af; --line:#1f2937;
      --btn:#2563eb; --btn2:#374151; --radius:16px;
    }
    [data-theme="light"]{
      --bg:#f3f4f6; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
      --btn:#2563eb; --btn2:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg);
      color:var(--text);
    }
    header{
      position:sticky;
      top:0;
      z-index:5;
      background:linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,0));
      backdrop-filter: blur(10px);
    }
    .wrap{max-width:920px;margin:0 auto;padding:16px}

    .topbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    h1{font-size:18px;margin:0;letter-spacing:.2px}
    .pill{
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--muted);
      padding:8px 10px;
      border-radius:999px;
      font-size:13px
    }
    .controls{display:flex;gap:10px;flex:1;min-width:240px}
    input[type="search"]{
      width:100%;
      padding:12px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--text);
      outline:none;
    }
    .btn{
      border:0;border-radius:999px;
      padding:12px 14px;cursor:pointer;
      color:white;background:var(--btn);
      font-weight:700;
    }
    .btn.secondary{
      background:var(--btn2);
      color:var(--text);
      border:1px solid var(--line);
      font-weight:700;
    }

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .tab{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--text);
      cursor:pointer;
    }
    .tab.active{
      background:rgba(37,99,235,.18);
      border-color:rgba(37,99,235,.45);
    }

    main{padding:8px 0 24px}
    .grid{display:grid;grid-template-columns:repeat(1,minmax(0,1fr));gap:12px}
    @media (min-width:640px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
    @media (min-width:900px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}}

    /* Tarjeta vertical: arriba info, abajo botones */
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:0 6px 18px rgba(0,0,0,.18);

      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:12px;
    }
    .cardTop{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .icon{
      width:38px;height:38px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      display:grid;place-items:center;
      flex:0 0 38px;
      overflow:hidden;
      border:1px solid var(--line);
      font-weight:900;
      font-size:20px;
    }
    .icon img{width:22px;height:22px}

    .meta{min-width:0;flex:1}
    .name{
      font-weight:800;
      margin:0;
      font-size:15px;
      line-height:1.2;

      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .desc{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
    }
    .mini{
      flex:1;
      max-width:140px;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
    }

    .footer{
      color:var(--muted);
      font-size:12px;
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <h1>Panel rpi4</h1>
      <span class="pill" id="countPill">0 links</span>

      <div class="controls">
        <input id="q" type="search" placeholder="Buscar…" autocomplete="off" />
      </div>

      <button class="btn secondary" id="themeBtn">🌙/☀️</button>
      <button class="btn secondary" id="openGroupBtn">Abrir grupo</button>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="footer">
      <span>Tip: en Android → Chrome → “Añadir a pantalla de inicio”.</span>
      <span title="El navegador puede bloquear aperturas múltiples">ℹ️</span>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="grid" id="grid"></div>
</main>

<script>
  // Servicios locales (con icon emoji por app)
  const LINKS = [
    { name:"WeTTY",         url:"http://192.168.1.78:3000/wetty", group:"Terminal",  desc:"Terminal web (SSH)",        icon:"🖥️" },
    { name:"Jellyfin",      url:"http://192.168.1.78:8096/",      group:"Media",     desc:"Servidor multimedia",       icon:"🎞️" },
    { name:"qBittorrent",   url:"http://192.168.1.78:9013/",      group:"Descargas", desc:"Gestor de descargas (Web)", icon:"⬇️" },
    { name:"MLDonkey",      url:"http://192.168.1.78:9012/",      group:"Descargas", desc:"Interfaz clásica",          icon:"🐒" },
    { name:"MLDonkey Next", url:"http://192.168.1.78:4081/",      group:"Descargas", desc:"Interfaz Next",             icon:"🚀" },
  ];

  const $ = (id)=>document.getElementById(id);
  const uniq = (arr)=>[...new Set(arr)];
  const hostOf = (u)=>{ try{ return new URL(u).hostname; } catch(e){ return ""; } };
  const favicon = (u)=>`https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostOf(u))}&sz=64`;

  function openUrl(url){
    const w = window.open(url, "_blank", "noopener,noreferrer");
    if (w) w.opener = null;
  }

  const state = {
    group: "Todos",
    q: "",
    theme: localStorage.getItem("theme") || "dark"
  };

  function applyTheme(){
    document.documentElement.dataset.theme = state.theme === "light" ? "light" : "";
    localStorage.setItem("theme", state.theme);
  }

  function getGroups(){ return ["Todos", ...uniq(LINKS.map(x=>x.group))]; }

  function filteredLinks(){
    const q = state.q.trim().toLowerCase();
    return LINKS.filter(x=>{
      const inGroup = state.group === "Todos" ? true : x.group === state.group;
      const inQuery = !q ? true : (x.name + " " + x.desc + " " + x.url).toLowerCase().includes(q);
      return inGroup && inQuery;
    });
  }

  function renderTabs(){
    const tabs = $("tabs");
    tabs.innerHTML = "";
    getGroups().forEach(g=>{
      const b = document.createElement("button");
      b.className = "tab" + (g===state.group ? " active" : "");
      b.textContent = g;
      b.onclick = ()=>{ state.group = g; render(); };
      tabs.appendChild(b);
    });
  }

  function renderGrid(){
    const items = filteredLinks();
    $("countPill").textContent = `${items.length} links`;

    const grid = $("grid");
    grid.innerHTML = "";

    items.forEach(item=>{
      const card = document.createElement("div");
      card.className = "card";

      const top = document.createElement("div");
      top.className = "cardTop";

      const icon = document.createElement("div");
      icon.className = "icon";

      // 👇 MODIFICACIÓN: si hay item.icon usa emoji; si no, favicon
      const img = document.createElement("img");
      img.alt = "";
      if (item.icon) {
        icon.textContent = item.icon;
      } else {
        img.src = favicon(item.url);
        icon.appendChild(img);
        img.onerror = ()=>{ img.style.display="none"; icon.textContent="🔗"; };
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <p class="name">${item.name}</p>
        <p class="desc">${item.desc || hostOf(item.url)}</p>
      `;

      top.appendChild(icon);
      top.appendChild(meta);

      const actions = document.createElement("div");
      actions.className = "actions";

      const openBtn = document.createElement("button");
      openBtn.className = "mini";
      openBtn.textContent = "Abrir";
      openBtn.onclick = ()=>openUrl(item.url);

      const copyBtn = document.createElement("button");
      copyBtn.className = "mini";
      copyBtn.textContent = "Copiar";
      copyBtn.onclick = async ()=>{
        try {
          await navigator.clipboard.writeText(item.url);
          copyBtn.textContent="✅";
          setTimeout(()=>copyBtn.textContent="Copiar", 900);
        } catch(e){
          alert("No se pudo copiar. Mantén pulsado y copia manualmente.");
        }
      };

      actions.appendChild(openBtn);
      actions.appendChild(copyBtn);

      card.appendChild(top);
      card.appendChild(actions);
      grid.appendChild(card);
    });
  }

  function openGroup(){
    const items = filteredLinks();
    if (!items.length) return;

    const g = state.group === "Todos" ? "los resultados" : `el grupo "${state.group}"`;
    if (!confirm(`¿Abrir ${items.length} pestañas de ${g}? (El navegador puede bloquear algunas)`)) return;

    // PC: primera→última | Móvil: última→primera
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const list = isMobile ? items.slice().reverse() : items;
    list.forEach((it, i) => setTimeout(() => openUrl(it.url), i * 250));
  }

  function render(){ renderTabs(); renderGrid(); }

  $("q").addEventListener("input", (e)=>{ state.q = e.target.value; renderGrid(); });
  $("themeBtn").onclick = ()=>{
    state.theme = (state.theme === "dark") ? "light" : "dark";
    applyTheme();
  };
  $("openGroupBtn").onclick = openGroup;

  applyTheme();
  render();
</script>
</body>
</html>
